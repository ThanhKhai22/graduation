<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Thiệp mời Lễ Tốt Nghiệp</title>
<meta name="theme-color" content="#0F2036">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=Alex+Brush&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FAF6EC; --gold:#C79B4A; --gold-soft:#E4CD94;
  --maroon:#7C1B24; --ink:#4A302A; --ink-dim:#6B5F53; --navy:#0F2036; --navy-2:#16314F;
}
*{box-sizing:border-box;}
h1,p{margin:0;}
html,body{height:100%;}
body{margin:0;background:var(--navy);color:var(--ink);font-family:'Be Vietnam Pro',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;}
.eyebrow{font-size:12px;letter-spacing:.3em;text-transform:uppercase;font-weight:600;}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important;}}

/* ============ TRANG BÌA ============ */
#cover{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;
  background:radial-gradient(120% 140% at 50% -10%,#1C3B60 0%,var(--navy) 55%),var(--navy);
  transition:opacity .7s ease,visibility .7s ease;}
#cover.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.cover-eyebrow{color:var(--gold-soft);margin-bottom:22px;}
.envelope{position:relative;width:min(280px,72vw);aspect-ratio:3/2;margin:0 auto 22px;perspective:1000px;
  transition:transform .4s cubic-bezier(.2,.8,.3,1),filter .4s ease;}
.envelope:hover,.envelope.lift{transform:translateY(-8px) scale(1.02);filter:drop-shadow(0 18px 26px rgba(0,0,0,.35));}
.env-body{position:absolute;inset:0;background:linear-gradient(160deg,#F3ECDD,#FAF5EA);border:1px solid rgba(199,155,74,.45);border-radius:8px;box-shadow:0 20px 50px rgba(0,0,0,.3);overflow:hidden;}
.env-body::before,.env-body::after{content:'';position:absolute;bottom:0;width:0;height:0;border-style:solid;}
.env-body::before{left:0;border-width:0 0 50% 52%;border-color:transparent transparent rgba(199,155,74,.14) transparent;}
.env-body::after{right:0;border-width:0 52% 50% 0;border-color:transparent transparent rgba(199,155,74,.14) transparent;}
.env-flap{position:absolute;top:0;left:0;width:100%;height:58%;background:linear-gradient(155deg,var(--navy-2),var(--navy));clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top center;transition:transform 1s cubic-bezier(.6,.2,.2,1),opacity .5s ease .3s;z-index:3;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8%;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.envelope.open .env-flap{transform:rotateX(150deg);opacity:0;}
.seal{width:58px;height:58px;border-radius:50%;border:1.5px solid var(--gold);background:var(--navy);display:flex;align-items:center;justify-content:center;position:relative;animation:breathe 3.6s ease-in-out infinite;transition:transform .3s,background .3s,border-color .3s,box-shadow .3s;}
.seal::before{content:'';position:absolute;inset:6px;border:1px solid rgba(199,155,74,.45);border-radius:50%;}
.seal svg{width:25px;height:25px;color:var(--gold-soft);transition:color .3s;}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(199,155,74,0);}50%{box-shadow:0 0 20px 4px rgba(199,155,74,.22);}}
.envelope:hover .seal,.envelope.lift .seal{transform:translateY(-3px) scale(1.06);background:var(--gold);border-color:var(--gold-soft);box-shadow:0 10px 22px rgba(199,155,74,.5);}
.envelope:hover .seal svg,.envelope.lift .seal svg{color:var(--navy);}
.cover-title{color:#F3EEE0;font-family:'Playfair Display',serif;font-weight:500;font-size:clamp(24px,6vw,38px);line-height:1.3;max-width:90vw;margin-top:4px;}
.cover-title span{display:block;}
.cover-title .sub{font-size:.66em;margin-top:8px;font-style:italic;color:var(--gold-soft);font-weight:400;}

/* ============ TRANG NỘI DUNG (lá thư giới hạn khung) ============ */
#letterPage{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;
  background:var(--navy);padding:16px;}
.letter-card{
  position:relative;
  width:min(430px,92vw,calc(90svh / 1.58));
  aspect-ratio:1/1.58;
  background:var(--cream);
  border:1px solid rgba(199,155,74,.4);
  border-radius:14px;
  box-shadow:0 30px 70px rgba(0,0,0,.45);
  overflow:hidden;
  container-type:size;
  transform:translateY(18vh) scale(.16);
  opacity:0;
  transition:transform .9s cubic-bezier(.16,.8,.2,1),opacity .6s ease;
}
.letter-card.shown{transform:translateY(0) scale(1);opacity:1;}
.silk{position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(55% 35% at 10% 6%,rgba(255,255,255,.9),transparent 60%),
    radial-gradient(50% 40% at 92% 12%,rgba(150,140,150,.12),transparent 65%),
    radial-gradient(65% 45% at 15% 45%,rgba(255,255,255,.65),transparent 60%),
    radial-gradient(55% 40% at 88% 55%,rgba(150,140,150,.12),transparent 65%),
    radial-gradient(60% 45% at 25% 90%,rgba(255,255,255,.7),transparent 60%),
    radial-gradient(50% 35% at 95% 96%,rgba(150,140,150,.12),transparent 65%);
  animation:silk-drift 20s ease-in-out infinite;
}
@keyframes silk-drift{
  0%,100%{transform:scale(1) translate(0,0);}
  50%{transform:scale(1.08) translate(-2.5%,2%);}
}

.fabric-sheen{
  position:absolute; inset:0; pointer-events:none;
  background: repeating-linear-gradient(120deg,
    transparent 0%, transparent 8%,
    rgba(255,255,255,0.85) 12%,
    transparent 16%, transparent 30%,
    rgba(120,110,100,0.14) 34%,
    transparent 38%, transparent 55%,
    rgba(255,255,255,0.65) 59%,
    transparent 63%, transparent 100%
  );
  background-size: 260% 260%;
  animation: sheen-move 9s ease-in-out infinite alternate;
}
@keyframes sheen-move{
  0%{ background-position: 0% 0%; }
  100%{ background-position: 100% 60%; }
}

.silk-noise{position:absolute;inset:0;opacity:.045;mix-blend-mode:multiply;pointer-events:none;}


.letter-inner{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:2.2cqh 6cqw 4.8cqh;}

/* ---- Vùng 1 ---- */
.zone-top{flex:0 0 auto;display:flex;flex-direction:column;justify-content:flex-start;gap:2.4cqh;}
.brand-row{display:flex;align-items:center;justify-content:center;gap:1.8cqw;width:100%;}
.brand-logo{width:8cqh;height:8cqh;border-radius:50%;background:radial-gradient(circle at 32% 28%,#fff,#F3ECD8 78%);border:1.2px solid rgba(199,155,74,.5);box-shadow:0 6px 14px rgba(60,40,30,.18);display:flex;align-items:center;justify-content:center;padding:1.2cqh;flex-shrink:0;}
.brand-logo img{width:100%;height:100%;object-fit:contain;}
.brand-school{font-size:2.5cqw;line-height:1.4;letter-spacing:.02em;text-transform:uppercase;color:#3D312B;text-align:left;white-space:nowrap;}

/* dải sash - phủ tuyệt đối 2 bên, không chiếm chỗ trong luồng nội dung */
.sash{position:absolute;top:-2px;height:42cqh;width:auto;aspect-ratio:173/900;z-index:1;pointer-events:none;filter:drop-shadow(0 10px 14px rgba(60,20,20,.3));}
.sash-left{left:0;border-top-left-radius:14px;}
.sash-right{right:0;border-top-right-radius:14px;}

.gc-title{position:relative;text-align:center;}
.gc-title span{display:block;font-family:'Playfair Display',serif;font-style:italic;font-weight:600;font-size:6.6cqh;line-height:1.06;color:var(--ink);margin-top:1cqh}
.gc-cap{position:absolute;top:-5cqh;left:75%;transform:translateX(-50%) rotate(-3deg);width:8cqh;height:auto;margin-top:1cqh;fill:#20201d}

/* ---- Vùng 2 ---- */
.zone-mid{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:1.4cqh;margin-top:5.5cqh;}
.p-name{font-family:'Alex Brush',cursive;font-size:9.4cqw;color:#7C1B24;white-space:nowrap;line-height:1;}
.p-msg{font-family:'Playfair Display',serif;font-style:italic;font-size:2.8cqh;color:#5F5148;line-height:1.4;}

/* ---- Vùng 3 ---- */
.zone-bottom{flex:0 0 auto;display:flex;flex-direction:column;gap:3cqh;margin-top: -5cqh;}
.dt-row{display:flex;align-items:center;justify-content:center;gap:3.5cqw;}
.wd-col,.time-col{display:flex;flex-direction:column;align-items:center;gap:.7cqh;}
.wd-line{width:100%;height:1px;background:rgba(199,155,74,.5);}
.wd-label{font-size:1.95cqh;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);font-weight:600;}
.date-col{display:flex;flex-direction:column;align-items:center;gap:1.3cqh;}
.date-month{font-size:1.7cqh;letter-spacing:.24em;color:var(--maroon);text-transform:uppercase;}
.date-day{font-family:'Playfair Display',serif;font-weight:600;font-size:6.6cqh;margin-top:-2.5cqh;line-height:1;color:var(--ink);animation:pulse-day 2.2s ease-in-out infinite;}
.date-year{font-size:1.7cqh;letter-spacing:.14em;color:var(--ink-dim);}
@keyframes pulse-day{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.time-badge{font-size:3cqw;letter-spacing:.04em;color:var(--ink);font-weight:600;white-space:nowrap;}
.loc-block{text-align:center;}
.loc-label{font-size:1.4cqh;letter-spacing:.28em;color:var(--gold);text-transform:uppercase;margin-bottom:2.5cqh;}
.loc-venue{font-family:'Playfair Display',serif;font-size:3.8cqw;color:var(--ink);margin-bottom:2.3cqh;white-space:nowrap;}
.loc-addr{font-size:2.5cqh;color:var(--ink-dim);margin-bottom:2cqh;line-height:1.3;}
.loc-btn{display:inline-flex;align-items:center;gap:.6cqw;background:var(--navy);color:#C79B4A;padding:1cqh 3.6cqw;border-radius:999px;text-decoration:none;font-size:1.55cqh;letter-spacing:.1em;text-transform:uppercase;box-shadow:0 8px 18px rgba(15,32,54,.25);transition:transform .25s,background .3s;}
.loc-btn:hover{background:var(--navy-2);transform:translateY(-2px);}
.loc-btn svg{width:1.8cqh;height:1.8cqh;}

/* nút nhạc – góc dưới phải của tấm thiệp */
#musicBtn{position:absolute;right:3.2cqw;bottom:3.2cqw;z-index:5;width:8cqh;height:8cqh;min-width:36px;min-height:36px;border-radius:50%;background:var(--navy);border:1px solid rgba(199,155,74,.45);color:var(--gold-soft);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,0,0,.28);touch-action:manipulation;-webkit-tap-highlight-color:transparent;opacity:0;transition:opacity .5s ease;}
#musicBtn.in{opacity:1;}
#musicBtn svg{width:46%;height:46%;}
#musicBtn #slash{opacity:1;transition:opacity .25s ease;}
#musicBtn.playing #slash{opacity:0;}
#musicBtn.playing svg{animation:note-pulse 1.7s ease-in-out infinite;}
@keyframes note-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.14);}}

/* ============ HIỆU ỨNG XUẤT HIỆN ============ */
.sash-left{opacity:0;transform:translateY(-60%) rotate(-8deg);}
.sash-right{opacity:0;transform:translateY(-60%) rotate(8deg);}
.letter-card.opened .sash-left{animation:sash-drop .8s cubic-bezier(.2,.7,.3,1) .15s forwards;}
.letter-card.opened .sash-right{animation:sash-drop 0.8s cubic-bezier(.2,.7,.3,1) .25s forwards;}
@keyframes sash-drop{to{opacity:1;transform:translateY(0) rotate(0);}}

.brand-row{opacity:0;transform:scale(.9);}
.letter-card.opened .brand-row{animation:brand-fade .7s ease .4s forwards;}
@keyframes brand-fade{to{opacity:1;transform:scale(1);}}

.gc-title span{opacity:0;transform:translateY(14px);}
.letter-card.opened .gc-title span:nth-child(1){animation:title-rise .7s ease .55s forwards;}
.letter-card.opened .gc-title span:nth-child(2){animation:title-rise .7s ease .68s forwards;}
@keyframes title-rise{to{opacity:1;transform:translateY(0);}}
.gc-cap{opacity:0;transform:rotate(-40deg) scale(.4);}
.letter-card.opened .gc-cap{animation:cap-pop .6s cubic-bezier(.34,1.56,.64,1) .85s forwards;}
@keyframes cap-pop{to{opacity:1;transform:rotate(-12deg) scale(1);}}

.p-name{opacity:0;transform:translateY(10px);}
.letter-card.opened .p-name{animation:name-fade .8s ease 1s forwards;}
@keyframes name-fade{to{opacity:1;transform:translateY(0);}}

.p-msg{opacity:0;transform:translateY(10px);}
.letter-card.opened .p-msg{animation:msg-fade .7s ease 1.2s forwards;}
@keyframes msg-fade{to{opacity:1;transform:translateY(0);}}

.wd-col,.date-col,.time-col{opacity:0;transform:scale(.85);}
.letter-card.opened .wd-col{animation:date-pop .55s cubic-bezier(.34,1.56,.64,1) 1.45s forwards;}
.letter-card.opened .date-col{animation:date-pop .6s cubic-bezier(.34,1.56,.64,1) 1.55s forwards;}
.letter-card.opened .time-col{animation:date-pop .55s cubic-bezier(.34,1.56,.64,1) 1.65s forwards;}
@keyframes date-pop{to{opacity:1;transform:scale(1);}}

.loc-block > *{opacity:0;transform:translateY(10px);}
.letter-card.opened .loc-label{animation:loc-fade .6s ease 1.8s forwards;}
.letter-card.opened .loc-venue{animation:loc-fade .6s ease 1.9s forwards;}
.letter-card.opened .loc-addr{animation:loc-fade .6s ease 2s forwards;}
@keyframes loc-fade{to{opacity:1;transform:translateY(0);}}

.loc-btn{opacity:0;transform:scale(.85);}
.letter-card.opened .loc-btn{animation:btn-pop .55s cubic-bezier(.34,1.56,.64,1) 2.15s forwards;}
@keyframes btn-pop{to{opacity:1;transform:scale(1);}}
</style>
</head>
<body>

<!-- TRANG BÌA -->
<div id="cover">
  <p class="eyebrow cover-eyebrow">Chạm để mở thiệp</p>
  <div class="envelope" id="envelope">
    <div class="env-body"></div>
    <div class="env-flap" id="envFlap" role="button" tabindex="0" aria-label="Mở thiệp">
      <div class="seal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 4L2 8l10 4 10-4-10-4z"/><path d="M6 10.3V15c0 1.5 2.7 3 6 3s6-1.5 6-3v-4.7"/><path d="M20 8.3v5"/><circle cx="20" cy="14.6" r=".9" fill="currentColor" stroke="none"/>
        </svg>
      </div>
    </div>
  </div>
  <h1 class="cover-title">
    <span>Một chương đã khép lại,</span>
    <span class="sub">một hành trình mới bắt đầu</span>
  </h1>
</div>

<!-- TRANG NỘI DUNG -->
<div id="letterPage">
  <div class="letter-card" id="letterCard">
    <div class="silk"></div>
    <div class="fabric-sheen"></div>
    <img class="sash sash-left" src="assets/sash-left.png" alt="">
    <img class="sash sash-right" src="assets/sash-right.png" alt="">
    <svg class="silk-noise" xmlns="http://www.w3.org/2000/svg">
      <filter id="t">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="2" seed="7" result="n">
          <animate attributeName="baseFrequency" values="0.012 0.02;0.017 0.027;0.012 0.02" dur="13s" repeatCount="indefinite"/>
        </feTurbulence>
        <feColorMatrix in="n" type="matrix" values="0 0 0 0 .35 0 0 0 0 .3 0 0 0 0 .28 0 0 0 .5 0"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#t)"/>
    </svg>

    <div class="letter-inner">
      <div class="zone-top">
        <div class="brand-row">
          <div class="brand-logo"><img id="schoolLogo" src="assets/logo.png" alt="Logo trường" onerror="this.parentElement.style.display='none'"></div>
          <p class="brand-school" id="schoolName"></p>
        </div>
        <div class="gc-title">
          <span>Graduation</span>
          <span>Ceremony</span>
          <svg class="gc-cap" viewBox="0 0 24 24" fill="none" stroke="#201A15" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 4L2 8l10 4 10-4-10-4z"/><path d="M6 10.3V15c0 1.5 2.7 3 6 3s6-1.5 6-3v-4.7"/><path d="M20 8.3v5"/><circle cx="20" cy="14.6" r=".9" fill="#201A15" stroke="none"/>
          </svg>
        </div>
      </div>

      <div class="zone-mid">
        <p class="p-name" id="graduateName"></p>
        <p class="p-msg" id="msgText"></p>
      </div>

      <div class="zone-bottom">
        <div class="dt-row">
          <div class="wd-col"><span class="wd-line"></span><p class="wd-label" id="dateWeekday"></p><span class="wd-line"></span></div>
          <div class="date-col">
            <p class="date-month" id="dateMonth"></p>
            <p class="date-day" id="dateDay"></p>
            <p class="date-year" id="dateYear"></p>
          </div>
          <div class="time-col"><span class="wd-line"></span><p class="time-badge" id="timeBadge"></p><span class="wd-line"></span></div>
        </div>
        <div class="loc-block">
          <p class="loc-label">Location</p>
          <p class="loc-venue" id="locVenue"></p>
          <p class="loc-addr" id="locAddr"></p>
          <a class="loc-btn" id="mapBtn" href="#" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s7-6.5 7-12a7 7 0 10-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.4"/></svg>
            Chỉ đường
          </a>
        </div>
      </div>
    </div>

    <button id="musicBtn" aria-label="Bật nhạc nền">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l11-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="17" cy="16" r="3"/><line id="slash" x1="2.5" y1="2.5" x2="21.5" y2="21.5"/>
      </svg>
    </button>
  </div>
</div>
<audio id="bgm" src="assets/nhac-nen.mp3" loop preload="none"></audio>

<script>
const CONFIG = {
  schoolName: "Trường Đại học Ngoại ngữ\nĐại học Đà Nẵng",
  schoolLogo: "assets/logo.png",
  graduateName: "Nguyễn Thị Long Tuyến",
  msgLine1: "Hy vọng trong bức tranh thanh xuân của tớ",
  msgLine2: "sẽ có sự góp mặt của cậu",
  weekdayLabel: "Thứ Bảy",
  dateMonth: "JULY",
  dateDay: "25",
  dateYear: "2026",
  timeStart: "09:00",
  timeEnd: "11:00",
  venueName: "Trường Đại học Ngoại ngữ – Đại học Đà Nẵng",
  address: "131 Lương Nhữ Hộc, Cẩm Lệ, Đà Nẵng",
  mapUrl: "https://www.google.com/maps/place/Tr%C6%B0%E1%BB%9Dng+%C4%90%E1%BA%A1i+h%E1%BB%8Dc+Ngo%E1%BA%A1i+ng%E1%BB%AF+%C4%90%C3%A0+N%E1%BA%B5ng+-+C%C6%A1+s%E1%BB%9F+2/@16.0347395,108.2112724,18z/data=!4m7!1m4!3m3!1s0x0:0x0!2zMTbCsDAyJzA1LjQiTiAxMDjCsDEyJzQwLjMiRQ!3b1!3m1!1s0x0000000000000000:0x4dbbb9ccec61fee3",
  music: "assets/nhac-nen.mp3"
};

function fillText(id, str){ document.getElementById(id).innerHTML = str.replace(/\n/g,'<br>'); }

function populate(){
  fillText('schoolName', CONFIG.schoolName);
  document.getElementById('schoolLogo').src = CONFIG.schoolLogo;
  document.getElementById('graduateName').textContent = CONFIG.graduateName;
  document.getElementById('msgText').innerHTML = CONFIG.msgLine1 + '<br>' + CONFIG.msgLine2;
  document.getElementById('dateWeekday').textContent = CONFIG.weekdayLabel;
  document.getElementById('dateMonth').textContent = CONFIG.dateMonth;
  document.getElementById('dateDay').textContent = CONFIG.dateDay;
  document.getElementById('dateYear').textContent = CONFIG.dateYear;
  document.getElementById('timeBadge').textContent = CONFIG.timeStart + ' – ' + CONFIG.timeEnd;
  fillText('locVenue', CONFIG.venueName);
  fillText('locAddr', CONFIG.address);
  document.getElementById('mapBtn').href = CONFIG.mapUrl;
  document.getElementById('bgm').src = CONFIG.music;
  document.title = "Thiệp mời Lễ Tốt Nghiệp – " + CONFIG.graduateName;
}

function initMusic(){
  const btn = document.getElementById('musicBtn');
  const audio = document.getElementById('bgm');
  let playing = false;
  function setState(p){
    playing = p;
    btn.classList.toggle('playing', playing);
    btn.setAttribute('aria-label', playing ? 'Tắt nhạc' : 'Bật nhạc');
  }
  btn.addEventListener('click', ()=>{
    if(playing){ audio.pause(); setState(false); }
    else{ if(audio.currentTime===0){ try{ audio.currentTime = 35.30; }catch(e){} } audio.play().then(()=>setState(true)).catch(()=>setState(false)); }
  });
  return { setState };
}

function initGate(musicControl){
  const cover = document.getElementById('cover');
  const envelope = document.getElementById('envelope');
  const envFlap = document.getElementById('envFlap');
  const card = document.getElementById('letterCard');
  const musicBtn = document.getElementById('musicBtn');
  const audio = document.getElementById('bgm');
  let opened = false;

  function reveal(){
    card.classList.add('shown');
    setTimeout(()=>{ card.classList.add('opened'); musicBtn.classList.add('in'); }, 350);
    try{ audio.currentTime = 35.56; }catch(e){}
    audio.play().then(()=>musicControl.setState(true)).catch(()=>{});
    setTimeout(()=>{ cover.classList.add('hidden'); }, 500);
  }
  function openInvitation(){
    if(opened) return;
    opened = true;
    envelope.classList.add('lift');
    setTimeout(()=>{
      envelope.classList.add('open');
      setTimeout(reveal, 650);
    }, 260);
  }
  envFlap.addEventListener('click', openInvitation);
  envFlap.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openInvitation(); } });
}

document.addEventListener('DOMContentLoaded', ()=>{
  populate();
  const musicControl = initMusic();
  initGate(musicControl);
});
</script>
</body>
</html>
